<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <h1>Wo gibt es heute den schönsten Sonnenauf- oder untergang?</h1>
    </header>

    <main>
        <div class="cards-container">

            <div class="city-card" id="card-genf">
                <h2>Genf</h2>

                <div class="city-details">
                    <div class="event" id="event-sunset-genf" >
                        <img src="" alt="Wetter-Icon Sonnenuntergang" class="weather-icon" id="icon-sunset-genf">

                        <p class="weather-info">
                            <span id="temp-sunset-genf"></span>,
                            <br> <span id="description-sunset-genf"></span>
                        </p>
                        
                        <p class="sun-time">Nächster Sonnenuntergang:
                            <br> <span id="time-sunset-genf"></span>
                        </p>
                    </div>

                    <div class="event" id="event-sunrise-genf">
                        <img src="" alt="Wetter-Icon Sonnenaufgang" class="weather-icon" id="icon-sunrise-genf">

                        <p class="weather-info">
                            <span id="temp-sunrise-genf"></span>,
                            <br> <span id="description-sunrise-genf"></span>
                        </p>
                        
                        <p class="sun-time">Nächster Sonnenaufgang:
                            <br> <span id="time-sunrise-genf"></span>
                        </p>
                   </div>
                </div>
            </div>


            <div class="city-card" id="card-basel">
                <h2>Basel</h2>

                <div class="city-details">
                    
                    <div class="event" id="event-sunset-basel">
                        <img src="" alt="Wetter-Icon Sonnenuntergang" class="weather-icon" id="icon-sunset-basel">
                        
                        <p class="weather-info">
                            <span id="temp-sunset-basel"></span>,
                            <br> <span id="description-sunset-basel"></span>
                        </p>
                            
                        <p class="sun-time">Nächster Sonnenuntergang:
                            <br> <span id="time-sunset-basel"></span>
                        </p>
                    </div>

                    <div class="event" id="event-sunrise-basel">
                        <img src="" alt="Wetter-Icon Sonnenaufgang" class="weather-icon" id="icon-sunrise-basel">

                        <p class="weather-info">
                            <span id="temp-sunrise-basel"></span>,
                            <br> <span id="description-sunrise-basel"></span>
                        </p>

                        <p class="sun-time">Nächster Sonnenaufgang:
                            <br> <span id="time-sunrise-basel"></span>
                        </p>
                   </div>
                </div>
            </div>

            <div class="city-card" id="card-lugano">
                <h2>Lugano</h2>

                <div class="city-details">
                    
                    <div class="event" id="event-sunset-lugano">
                        <img src="" alt="Wetter-Icon Sonnenuntergang" class="weather-icon" id="icon-sunset-lugano">
                        
                        <p class="weather-info">
                            <span id="temp-sunset-lugano"></span>,
                            <br> <span id="description-sunset-lugano"></span>
                        </p>

                        <p class="sun-time">Nächster Sonnenuntergang:
                            <br> <span id="time-sunset-lugano"></span>
                        </p>
                    </div>

                    <div class="event" id="event-sunrise-lugano">
                        <img src="" alt="Wetter-Icon Sonnenaufgang" class="weather-icon" id="icon-sunrise-lugano">

                        <p class="weather-info">
                            <span id="temp-sunrise-lugano"></span>,
                            <br> <span id="description-sunrise-lugano"></span>
                        </p>
                        
                        <p class="sun-time">Nächster Sonnenaufgang:
                            <br> <span id="time-sunrise-lugano"></span>
                        </p>
                   </div>
                </div>
            </div>
        </div>

        <p id="best-option" class="best-option"></p>
    </main>


    <footer>
        <p>This is the footer of the page.</p>

    </footer>
    <script src="js/script.js" type="module"></script>
</body>
</html>
